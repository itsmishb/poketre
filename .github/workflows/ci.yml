name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 1. シークレットスキャン ─────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 全履歴スキャン（PRは diff のみ）
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE は OSS プランでは不要（public repo）

  # ── 2. TypeScript 型チェック ─────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit

  # ── 3. ESLint ────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint

  # ── 4. ビルド検証 ────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - name: Build (production)
        run: npm run build
        env:
          # ビルド時はダミー値で通す（実際の Vercel デプロイとは別）
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key

  # ── 5. DB マイグレーション構文チェック ──────────────────────────────────
  migration-lint:
    name: Migration SQL Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify migration file pairing
        run: |
          set -e
          echo "Migration ファイルのペア確認..."
          for up in db/migrations/*.up.sql; do
            base="${up%.up.sql}"
            down="${base}.down.sql"
            if [ ! -f "$down" ]; then
              echo "ERROR: down ファイルが見つかりません: $down"
              exit 1
            fi
            echo "  OK: $(basename $base)"
          done
          echo "全マイグレーションファイルのペア確認完了"
      - name: Check BEGIN/COMMIT in migrations
        run: |
          set -e
          FAIL=0
          for f in db/migrations/*.sql; do
            if ! grep -qi "BEGIN" "$f"; then
              echo "WARN: BEGIN が見つかりません: $f"
              FAIL=1
            fi
            if ! grep -qi "COMMIT" "$f"; then
              echo "WARN: COMMIT が見つかりません: $f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "全マイグレーションに BEGIN/COMMIT あり"
          exit $FAIL
